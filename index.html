<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>在庫管理アプリ</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: sans-serif; background: #111; color: #fff; }

/* ヘッダー */
.header {
  display: flex;
  align-items: center;
  padding: 8px 10px;
  gap: 8px;
  font-size: 16px;
  background: #1a1a1a;
  border-bottom: 1px solid #333;
}
.header-mode { display: flex; align-items: center; gap: 6px; flex: 1; }
.header-mode span { font-size: 18px; font-weight: bold; }

/* カメラ */
#reader { width: 100%; height: 50vh; }

/* スキャン結果バッファ */
#result {
  height: 20vh;
  overflow-y: auto;
  padding: 6px 10px;
  background: #000;
  border-top: 1px solid #333;
}

/* 在庫パネル */
#inventoryPanel {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 115px; /* 2 × 56px rows + borders */
  background: #111;
  overflow-y: auto;
  z-index: 10;
  padding: 10px;
}
#inventoryPanel h2 {
  margin: 0 0 10px;
  font-size: 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
#inventoryPanel h2 button {
  font-size: 14px;
  padding: 4px 10px;
  background: #555;
  color: #fff;
  border: none;
  border-radius: 4px;
}

/* アイテム行 */
.item {
  font-size: 16px;
  padding: 8px 5px;
  border-bottom: 1px solid #2a2a2a;
  display: flex;
  align-items: center;
  gap: 8px;
}
.item-name { font-weight: bold; color: #4fc3f7; flex: 1; }
.item-jan  { font-size: 12px; color: #888; }
.item-qty  { font-size: 18px; font-weight: bold; min-width: 48px; text-align: right; }
.loading   { color: #aaa; font-style: italic; }
.empty-msg { color: #666; padding: 10px; font-style: italic; }

/* ボタン共通 */
button { cursor: pointer; border: none; color: #fff; font-weight: bold; }

/* ヘッダーボタン */
.btn-small {
  padding: 6px 10px;
  font-size: 14px;
  border-radius: 4px;
  background: #2a5f8f;
}

/* コントロールバー（2段） */
.controls {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #1a1a1a;
  border-top: 1px solid #333;
}
.controls-row {
  display: flex;
  height: 56px;
}
.controls-row + .controls-row {
  border-top: 1px solid #333;
}
.controls-row button {
  flex: 1;
  font-size: 14px;
  padding: 0 4px;
}
.btn-undo    { background: #dc3545; }
.btn-reset   { background: #555; }
.btn-save    { background: #28a745; }
.btn-backup  { background: #17a2b8; }
.btn-restore { background: #fd7e14; }
.btn-cloud   { background: #6f42c1; }
.btn-stock   { background: #20c997; }
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="header">
  <div class="header-mode">
    モード：<span id="modeText">入荷</span>
    <button class="btn-small" onclick="toggleMode()">切替</button>
  </div>
</div>

<!-- カメラ -->
<div id="reader"></div>

<!-- スキャンバッファ表示 -->
<div id="result"><div class="empty-msg">スキャン待機中…</div></div>

<!-- 在庫一覧パネル -->
<div id="inventoryPanel">
  <h2>在庫一覧 <button onclick="closeInventory()">✕ 閉じる</button></h2>
  <div id="inventoryList"><div class="empty-msg">データなし</div></div>
</div>

<!-- コントロールボタン（2段） -->
<div class="controls">
  <div class="controls-row">
    <button class="btn-undo"  onclick="undo()">↩ 取消</button>
    <button class="btn-reset" onclick="resetBuffer()">リセット</button>
    <button class="btn-save"  onclick="saveData()">✓ 保存</button>
  </div>
  <div class="controls-row">
    <button class="btn-backup"  onclick="exportData()">📥 バックアップ</button>
    <button class="btn-restore" onclick="triggerImport()">📤 復元</button>
    <button class="btn-cloud"   onclick="handleCloud()">☁ クラウド</button>
    <button class="btn-stock"   onclick="openInventory()">📊 在庫表示</button>
  </div>
</div>

<!-- ファイル選択（非表示） -->
<input type="file" id="importFile" accept=".json,application/json" style="display:none" onchange="importData(this)">

<script>
"use strict";

/* =====================================================================
   定数
   ===================================================================== */
const STORAGE_KEY = "appData";

/* =====================================================================
   データ管理
   ===================================================================== */
let data = { items: [], settings: {}, updatedAt: 0 };

/** データ構造の簡易バリデーション */
function validateData(d) {
  return d !== null &&
    typeof d === "object" &&
    Array.isArray(d.items) &&
    typeof d.settings === "object";
}

/** localStorage へ保存 */
function saveLocal() {
  data.updatedAt = Date.now();
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) {
    console.error("ローカル保存に失敗しました:", e);
  }
}

/** localStorage から読み込み（起動時） */
function loadLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const parsed = JSON.parse(raw);
    if (validateData(parsed)) {
      data = parsed;
    } else {
      console.warn("保存データの形式が不正なため無視しました");
    }
  } catch (e) {
    console.error("ローカル読み込みに失敗しました:", e);
  }
}

/* =====================================================================
   アイテム操作
   ===================================================================== */

/** JAN コードでアイテムを検索 */
function getItem(jan) {
  return data.items.find(item => item.jan === jan) || null;
}

/** 在庫数を増減（存在しなければ新規追加） */
function applyDelta(jan, name, delta) {
  const item = getItem(jan);
  if (item) {
    item.qty += delta;
    if (name && name !== jan) item.name = name; /* 名前が判明したら更新 */
  } else {
    data.items.push({ jan, name: name || jan, qty: delta });
  }
}

/* =====================================================================
   クラウド連携（ダミー実装 — 後から差し替え可能）
   ===================================================================== */

/** Google Drive 等へ保存するダミー関数 */
async function saveToCloud(payload) {
  console.log("[Cloud] saveToCloud called (not implemented)", payload);
  return { success: false, message: "クラウド連携は未実装です" };
}

/** Google Drive 等から読み込むダミー関数 */
async function loadFromCloud() {
  console.log("[Cloud] loadFromCloud called (not implemented)");
  return null;
}

/* =====================================================================
   エクスポート / インポート
   ===================================================================== */

/** data を app-data.json としてダウンロード */
function exportData() {
  try {
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: "application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = "app-data.json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch (e) {
    alert("エクスポートに失敗しました: " + e.message);
  }
}

/** ファイル選択ダイアログを開く */
function triggerImport() {
  document.getElementById("importFile").value = "";
  document.getElementById("importFile").click();
}

/** 選択された JSON ファイルを読み込んで data を上書き */
function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function (e) {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!validateData(parsed)) {
        alert("無効なデータ形式です。items 配列と settings オブジェクトを含む JSON を選択してください。");
        return;
      }
      data = parsed;
      saveLocal();
      resetBuffer();
      updateInventoryDisplay();
      alert("復元が完了しました");
    } catch (err) {
      alert("JSON の解析に失敗しました: " + err.message);
    }
  };
  reader.readAsText(file);
}

/** クラウドボタン処理 */
async function handleCloud() {
  const result = await saveToCloud(data);
  alert(result.message);
}

/* =====================================================================
   スキャンバッファ
   ===================================================================== */
let mode = "in";
let buffer = {};
let history = [];
let productNames = {}; /* jan → null(取得中) | string(取得済み) */

/**
 * Open Food Facts API で商品名を取得する。
 * 取得できない場合は JAN コードをそのまま商品名として使用する。
 */
async function fetchProductName(jan) {
  if (productNames[jan] !== undefined) return;
  productNames[jan] = null; /* 取得中フラグ */
  try {
    const res = await fetch(
      `https://world.openfoodfacts.org/api/v2/product/${jan}?fields=product_name,product_name_ja`,
      { signal: AbortSignal.timeout(5000) }
    );
    const json = await res.json();
    productNames[jan] =
      (json.status === 1 && json.product &&
        (json.product.product_name_ja || json.product.product_name))
      || jan; /* 取得できなければバーコード文字列を商品名に使用 */
  } catch (e) {
    productNames[jan] = jan; /* エラー時もバーコード文字列を使用 */
  }
  updateDisplay();
}

/** スキャン成功コールバック */
function onScanSuccess(jan) {
  buffer[jan] = (buffer[jan] || 0) + 1;
  history.push(jan);
  if (productNames[jan] === undefined) {
    fetchProductName(jan);
  }
  updateDisplay();
  beep();
}

/** スキャンエラーコールバック（待機中の通常エラーは抑制） */
function onScanError() {}

/* =====================================================================
   カメラ
   ===================================================================== */
function startCamera() {
  const formats = [
    Html5QrcodeSupportedFormats.EAN_13,
    Html5QrcodeSupportedFormats.EAN_8,
    Html5QrcodeSupportedFormats.UPC_A,
    Html5QrcodeSupportedFormats.UPC_E,
    Html5QrcodeSupportedFormats.CODE_128,
    Html5QrcodeSupportedFormats.CODE_39,
    Html5QrcodeSupportedFormats.QR_CODE,
  ];
  const scanner = new Html5Qrcode("reader", { formatsToSupport: formats });
  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 280, height: 120 } },
    onScanSuccess,
    onScanError
  );
}

/* =====================================================================
   UI 操作
   ===================================================================== */

/** 入荷 / 出庫モードを切替 */
function toggleMode() {
  mode = mode === "in" ? "out" : "in";
  document.getElementById("modeText").textContent = mode === "in" ? "入荷" : "出庫";
}

/** 最後のスキャンを取り消す */
function undo() {
  const last = history.pop();
  if (!last) return;
  buffer[last]--;
  if (buffer[last] === 0) delete buffer[last];
  updateDisplay();
}

/** バッファをクリア */
function resetBuffer() {
  buffer  = {};
  history = [];
  updateDisplay();
}

/** バッファの内容を在庫データに保存 */
function saveData() {
  if (Object.keys(buffer).length === 0) {
    alert("スキャン結果がありません");
    return;
  }
  for (const jan in buffer) {
    const delta = mode === "in" ? buffer[jan] : -buffer[jan];
    const name  = productNames[jan] || jan;
    applyDelta(jan, name, delta);
  }
  saveLocal();
  resetBuffer();
  alert("保存しました");
}

/** 在庫パネルを開く */
function openInventory() {
  updateInventoryDisplay();
  document.getElementById("inventoryPanel").style.display = "block";
}

/** 在庫パネルを閉じる */
function closeInventory() {
  document.getElementById("inventoryPanel").style.display = "none";
}

/* =====================================================================
   表示更新
   ===================================================================== */

/** スキャンバッファ表示を更新 */
function updateDisplay() {
  const container = document.getElementById("result");
  const keys = Object.keys(buffer);
  if (keys.length === 0) {
    container.innerHTML = '<div class="empty-msg">スキャン待機中…</div>';
    return;
  }
  let html = "";
  for (const jan of keys) {
    const nameVal = productNames[jan];
    const nameHtml = nameVal === null
      ? `<span class="item-name loading">取得中…</span>`
      : `<span class="item-name">${escapeHtml(nameVal)}</span>`;
    html += `<div class="item">
      <span class="item-qty">× ${buffer[jan]}</span>
      ${nameHtml}
      <span class="item-jan">${escapeHtml(jan)}</span>
    </div>`;
  }
  container.innerHTML = html;
}

/** 在庫一覧パネルの表示を更新 */
function updateInventoryDisplay() {
  const container = document.getElementById("inventoryList");
  if (!container) return;
  if (data.items.length === 0) {
    container.innerHTML = '<div class="empty-msg">在庫データがありません</div>';
    return;
  }
  const sorted = [...data.items].sort((a, b) =>
    (a.name || a.jan).localeCompare(b.name || b.jan, "ja")
  );
  let html = "";
  for (const item of sorted) {
    const qtyColor = item.qty <= 0 ? "#f44336" : "#4fc3f7";
    html += `<div class="item">
      <span class="item-qty" style="color:${qtyColor}">${item.qty}</span>
      <div style="flex:1">
        <span class="item-name">${escapeHtml(item.name || item.jan)}</span>
        <div class="item-jan">${escapeHtml(item.jan)}</div>
      </div>
    </div>`;
  }
  container.innerHTML = html;
}

/** HTML エスケープ */
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

/** スキャン音 */
function beep() {
  try {
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    osc.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.05);
  } catch (e) {}
}

/* =====================================================================
   起動
   ===================================================================== */
loadLocal();
startCamera();
updateDisplay();
</script>

</body>
</html>
