<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { margin:0; font-family:sans-serif; background:#111; color:#fff; }

.header { padding:10px; font-size:18px; }

#reader { width:100%; height:60vh; }

#result {
  height:25vh;
  overflow:auto;
  padding:10px;
  background:#000;
}

.item {
  font-size:20px;
  padding:5px;
  border-bottom:1px solid #333;
}

.controls {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  height:90px;
}

button {
  flex:1;
  font-size:22px;
  border:none;
}

.undo { background:#dc3545; }
.reset { background:#555; }
.confirm { background:#28a745; }
</style>
</head>

<body>

<div class="header">
モード:
<span id="modeText">入荷</span>
<button onclick="toggleMode()">切替</button>
</div>

<div id="reader"></div>
<div id="result"></div>

<div class="controls">
  <button class="undo" onclick="undo()">↩</button>
  <button class="reset" onclick="resetBuffer()">リセット</button>
  <button class="confirm" onclick="saveData()">保存</button>
</div>

<script>
let mode="in";
let buffer={}, history=[];

/* デバッグ用の変更 - スキャン成功時と失敗時のログを追加 */
function onScanSuccess(jan) {
    console.log("スキャン成功: ", jan);
    buffer[jan]=(buffer[jan]||0)+1;
    history.push(jan);
    updateDisplay();
    beep();
}

function onScanError(error) {
    console.error("スキャンエラー: ", error);
}

/* モード */
function toggleMode(){
  mode = mode==="in" ? "out" : "in";
  document.getElementById("modeText").innerText =
    mode==="in" ? "入荷" : "出庫";
}

/* カメラ起動 */
function startCamera(){
  const html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode:"environment" },
    { fps:10, qrbox:250 },
    onScanSuccess,
    onScanError
  );
}

/* 表示 */
function updateDisplay(){
  let html="";
  for(let jan in buffer){
    html+=`<div class="item">${jan} × ${buffer[jan]}</div>`;
  }
  document.getElementById("result").innerHTML=html;
}

/* 保存（ローカル） */
function saveData(){
  let data = JSON.parse(localStorage.getItem("stock")||"{}");

  for(let jan in buffer){
    let qty = mode==="in" ? buffer[jan] : -buffer[jan];
    data[jan]=(data[jan]||0)+qty;
  }

  localStorage.setItem("stock", JSON.stringify(data));
  alert("保存完了");
  resetBuffer();
}

/* 操作 */
function undo(){
  let last=history.pop();
  if(!last)return;
  buffer[last]--;
  if(buffer[last]===0)delete buffer[last];
  updateDisplay();
}

function resetBuffer(){
  buffer={}; history=[];
  updateDisplay();
}

/* 音 */
function beep(){
  try{
    const ctx=new AudioContext();
    const osc=ctx.createOscillator();
    osc.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime+0.05);
  }catch(e){}
}

/* 起動 */
startCamera();
</script>

</body>
</html>
